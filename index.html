<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ゆきんこシューター</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      display: flex; justify-content: center; align-items: center;
      width: 100%; height: 100%;
      overflow: hidden; position: fixed;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
    }
    canvas { display: block; -webkit-touch-callout: none; }

    /* Photo button — transparent file input overlay, iOS-safe */
    #photo-btn {
      display: none;
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
    }
    #photo-btn-inner {
      position: relative;
      display: inline-block;
    }
    #photo-btn-face {
      background: rgba(40,40,40,0.95);
      color: #fff;
      font-size: 16px;
      padding: 13px 28px;
      border-radius: 12px;
      border: 1px solid #666;
      white-space: nowrap;
      pointer-events: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #photoInput {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

  <!-- Native HTML photo picker (not Phaser) — works on iOS Safari -->
  <div id="photo-btn">
    <div id="photo-btn-inner">
      <div id="photo-btn-face">📷 ゆきんこの写真を使う</div>
      <input type="file" id="photoInput" accept="image/*">
    </div>
  </div>

  <script>
    document.getElementById('photoInput').addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (ev) {
        localStorage.setItem('yukinkoPhoto', ev.target.result);
        location.reload();
      };
      reader.readAsDataURL(file);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="src/constants.js"></script>
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/scenes/GameOverScene.js"></script>

  <script>
    new Phaser.Game({
      type: Phaser.CANVAS,
      width: 480, height: 720,
      backgroundColor: '#08001a',
      scene: [BootScene, MenuScene, GameScene, GameOverScene],
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        parent: document.body,
      }
    });
  </script>
</body>
</html>
